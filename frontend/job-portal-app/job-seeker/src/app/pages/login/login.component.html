<div class="auth-container">
  <div class="card">
    <h2 style="text-align:center; margin-bottom:25px; color:#667eea;">
      🔐 Job Seeker Login
    </h2>

    <div *ngIf="errorMessage" class="alert-error">
      {{ errorMessage }}
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="Enter your email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Enter your password">
    </div>

    <button class="btn-primary" (click)="onLogin()">Login</button>

    <p style="text-align:center; margin-top:20px; font-size:14px;">
      Don't have an account? <a routerLink="/register">Register here</a>
    </p>
  </div>
</div>
