<div style="background:#f5f5f5; min-height:100vh;">

  <!-- Navbar -->
  <div class="navbar">
    <h1>💼 Job Portal</h1>
    <div class="navbar-links">
      <span style="color:#666;">Welcome, {{ authService.getName() }}</span>
      <a routerLink="/dashboard">
        <button class="btn-secondary">My Applications</button>
      </a>
      <button class="btn-danger" (click)="logout()">Logout</button>
    </div>
  </div>

  <!-- Content -->
  <div class="page-container">
    <h2 style="margin-bottom:20px; color:#333;">Available Jobs</h2>

    <div *ngIf="errorMessage" class="alert-error">{{ errorMessage }}</div>

    <div *ngIf="jobs.length === 0" class="card" style="text-align:center; padding:40px;">
      <p style="color:#666; font-size:16px;">No jobs available at the moment.</p>
    </div>

    <div *ngFor="let job of jobs" class="job-card" (click)="viewJob(job.jobId)">
      <h3>{{ job.jobTitle }}</h3>
      <p>🏢 {{ job.companyName }}</p>
      <p>📍 {{ job.location }}</p>
      <p>💰 {{ job.salaryRange }}</p>
      <small>📅 Posted: {{ job.postedDate | date }}</small>
    </div>

  </div>
</div>
