<div class="auth-container">
  <div class="card">
    <h2 style="text-align:center; margin-bottom:25px; color:#667eea;">
      📝 Create Account
    </h2>

    <div *ngIf="errorMessage" class="alert-error">
      {{ errorMessage }}
    </div>

    <div *ngIf="successMessage" class="alert-success">
      {{ successMessage }}
    </div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" [(ngModel)]="name" placeholder="Enter your full name">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="Enter your email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Create a password">
    </div>

    <button class="btn-primary" (click)="onRegister()">Register</button>

    <p style="text-align:center; margin-top:20px; font-size:14px;">
      Already have an account? <a routerLink="/login">Login here</a>
    </p>
  </div>
</div>
