<div style="max-width:400px; margin:100px auto; padding:20px; border:1px solid #ccc;">
  <h2>Job Seeker Register</h2>

  <div *ngIf="errorMessage" style="color:red; margin-bottom:10px;">
    {{ errorMessage }}
  </div>

  <div *ngIf="successMessage" style="color:green; margin-bottom:10px;">
    {{ successMessage }}
  </div>

  <div style="margin-bottom:10px;">
    <label>Name</label><br>
    <input type="text" [(ngModel)]="name" style="width:100%; padding:8px;">
  </div>

  <div style="margin-bottom:10px;">
    <label>Email</label><br>
    <input type="email" [(ngModel)]="email" style="width:100%; padding:8px;">
  </div>

  <div style="margin-bottom:10px;">
    <label>Password</label><br>
    <input type="password" [(ngModel)]="password" style="width:100%; padding:8px;">
  </div>

  <button (click)="onRegister()" style="width:100%; padding:10px; background:green; color:white; border:none; cursor:pointer;">
    Register
  </button>

  <p style="text-align:center; margin-top:10px;">
    Already have an account? <a routerLink="/login">Login</a>
  </p>
</div>
