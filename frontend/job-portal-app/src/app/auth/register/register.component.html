<div class="register-wrapper">
  <div class="register-card">

    <div class="register-header">
      <div class="logo">
        <i class="fas fa-briefcase"></i>
      </div>
      <h1>Job Portal</h1>
      <p>Create your account</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="name">
          <i class="fas fa-user"></i> Full Name
        </label>
        <input
          id="name"
          type="text"
          formControlName="name"
          placeholder="Enter your full name"
          [class.input-error]="name?.invalid && name?.touched"
        />
        <span class="error-text" *ngIf="name?.invalid && name?.touched">
          <i class="fas fa-exclamation-circle"></i>
          <span *ngIf="name?.errors?.['required']">Name is required</span>
          <span *ngIf="name?.errors?.['minlength']">Minimum 3 characters</span>
        </span>
      </div>

      <div class="form-group">
        <label for="email">
          <i class="fas fa-envelope"></i> Email Address
        </label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="Enter your email"
          [class.input-error]="email?.invalid && email?.touched"
        />
        <span class="error-text" *ngIf="email?.invalid && email?.touched">
          <i class="fas fa-exclamation-circle"></i>
          <span *ngIf="email?.errors?.['required']">Email is required</span>
          <span *ngIf="email?.errors?.['email']">Enter a valid email</span>
        </span>
      </div>

      <div class="form-group">
        <label for="password">
          <i class="fas fa-lock"></i> Password
        </label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Minimum 6 characters"
          [class.input-error]="password?.invalid && password?.touched"
        />
        <span class="error-text" *ngIf="password?.invalid && password?.touched">
          <i class="fas fa-exclamation-circle"></i>
          <span *ngIf="password?.errors?.['required']">Password is required</span>
          <span *ngIf="password?.errors?.['minlength']">Minimum 6 characters</span>
        </span>
      </div>

      <div class="form-group">
        <label for="confirmPassword">
          <i class="fas fa-lock"></i> Confirm Password
        </label>
        <input
          id="confirmPassword"
          type="password"
          formControlName="confirmPassword"
          placeholder="Re-enter your password"
          [class.input-error]="confirmPassword?.touched && registerForm.errors?.['passwordMismatch']"
        />
        <span class="error-text"
          *ngIf="confirmPassword?.touched && registerForm.errors?.['passwordMismatch']">
          <i class="fas fa-exclamation-circle"></i> Passwords do not match
        </span>
      </div>

      <div class="alert-error" *ngIf="errorMessage">
        <i class="fas fa-times-circle"></i> {{ errorMessage }}
      </div>

      <div class="alert-success" *ngIf="successMessage">
        <i class="fas fa-check-circle"></i> {{ successMessage }}
      </div>

      <button type="submit" class="btn-register" [disabled]="isLoading">
        <i class="fas fa-user-plus"></i>
        <span *ngIf="!isLoading">Register</span>
        <span *ngIf="isLoading">Registering...</span>
      </button>

      <p class="login-link">
        Already have an account?
        <a routerLink="/login">
          <i class="fas fa-sign-in-alt"></i> Login here
        </a>
      </p>

    </form>
  </div>
</div>
