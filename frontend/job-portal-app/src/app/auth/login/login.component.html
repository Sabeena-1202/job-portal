<div class="login-wrapper">
  <div class="login-card">

    <div class="login-header">
      <div class="logo">
        <i class="fas fa-briefcase"></i>
      </div>
      <h1>Job Portal</h1>
      <p>Sign in to your admin account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="email">
          <i class="fas fa-envelope"></i> Email Address
        </label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="Enter your email"
          [class.input-error]="email?.invalid && email?.touched"
        />
        <span class="error-text" *ngIf="email?.invalid && email?.touched">
          <i class="fas fa-exclamation-circle"></i>
          <span *ngIf="email?.errors?.['required']">Email is required</span>
          <span *ngIf="email?.errors?.['email']">Enter a valid email</span>
        </span>
      </div>

      <div class="form-group">
        <label for="password">
          <i class="fas fa-lock"></i> Password
        </label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Enter your password"
          [class.input-error]="password?.invalid && password?.touched"
        />
        <span class="error-text" *ngIf="password?.invalid && password?.touched">
          <i class="fas fa-exclamation-circle"></i>
          <span *ngIf="password?.errors?.['required']">Password is required</span>
          <span *ngIf="password?.errors?.['minlength']">Minimum 6 characters</span>
        </span>
      </div>

      <div class="alert-error" *ngIf="errorMessage">
        <i class="fas fa-times-circle"></i> {{ errorMessage }}
      </div>

      <button type="submit" class="btn-login" [disabled]="isLoading">
        <i class="fas fa-sign-in-alt"></i>
        <span *ngIf="!isLoading">Login</span>
        <span *ngIf="isLoading">Logging in...</span>
      </button>

      <p class="register-link">
        New user? <a routerLink="/register">
          <i class="fas fa-user-plus"></i> Register here
        </a>
      </p>

    </form>
  </div>
</div>
