<div class="users-wrapper">

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div>
      <h2><i class="fas fa-users"></i> Users</h2>
      <p>All registered job seekers</p>
    </div>
    <button class="btn-refresh" (click)="loadUsers()">
      <i class="fas fa-sync-alt"></i> Refresh
    </button>
  </div>

  <!-- ERROR -->
  <div class="alert-error" *ngIf="errorMessage">
    <i class="fas fa-times-circle"></i> {{ errorMessage }}
  </div>

  <!-- LOADING -->
  <div class="loading" *ngIf="isLoading">
    <i class="fas fa-spinner fa-spin"></i> Loading users...
  </div>

  <div *ngIf="!isLoading">

    <!-- SEARCH + COUNT -->
    <div class="table-toolbar">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input
          type="text"
          placeholder="Search by name or email..."
          [(ngModel)]="searchTerm"
          (input)="onSearch()"
        />
      </div>
      <span class="total-count">
        <i class="fas fa-users"></i>
        {{ filteredUsers.length }} users
      </span>
    </div>

    <!-- USERS TABLE -->
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Registered On</th>
            <th>Applications</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let user of filteredUsers; let i = index">
            <td>{{ i + 1 }}</td>
            <td>
              <div class="user-info">
                <div class="user-avatar">
                  <i class="fas fa-user"></i>
                </div>
                <span>{{ user.name }}</span>
              </div>
            </td>
            <td>
              <i class="fas fa-envelope"></i>
              {{ user.email }}
            </td>
            <td>
              <span class="badge badge-seeker">
                <i class="fas fa-user-tie"></i>
                {{ user.role }}
              </span>
            </td>
            <td>
              <i class="fas fa-calendar-alt"></i>
              {{ user.createdAt | date: 'dd MMM yyyy' }}
            </td>
            <td>
              <span class="badge-count">
                <i class="fas fa-file-alt"></i>
                {{ user.totalApplications }}
              </span>
            </td>
          </tr>
          <tr *ngIf="filteredUsers.length === 0">
            <td colspan="6" class="no-data">
              <i class="fas fa-inbox"></i> No users found
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
