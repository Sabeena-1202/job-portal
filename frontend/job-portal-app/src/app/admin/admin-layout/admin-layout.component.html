<div class="layout-wrapper" [class.sidebar-closed]="!isSidebarOpen">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="sidebar-brand">
      <i class="fas fa-briefcase"></i>
      <span>Job Portal</span>
    </div>

    <div class="sidebar-admin">
      <div class="admin-avatar">
        <i class="fas fa-user-shield"></i>
      </div>
      <div class="admin-info">
        <span class="admin-name">{{ adminName }}</span>
        <span class="admin-role">Administrator</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <ul>
        <li>
          <a routerLink="/admin/dashboard" routerLinkActive="active">
            <i class="fas fa-tachometer-alt"></i>
            <span>Dashboard</span>
          </a>
        </li>
        <li>
          <a routerLink="/admin/jobs" routerLinkActive="active">
            <i class="fas fa-briefcase"></i>
            <span>Jobs</span>
          </a>
        </li>
        <li>
          <a routerLink="/admin/users" routerLinkActive="active">
            <i class="fas fa-users"></i>
            <span>Users</span>
          </a>
        </li>
        <li>
          <a routerLink="/admin/applications" routerLinkActive="active">
            <i class="fas fa-file-alt"></i>
            <span>Applications</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-logout" (click)="logout()">
        <i class="fas fa-sign-out-alt"></i>
        <span>Logout</span>
      </button>
    </div>

  </aside>

  <!-- MAIN CONTENT -->
  <div class="main-content">

    <!-- TOPBAR -->
    <header class="topbar">
      <button class="toggle-btn" (click)="toggleSidebar()">
        <i class="fas fa-bars"></i>
      </button>
      <div class="topbar-right">
        <span class="topbar-admin">
          <i class="fas fa-user-circle"></i> {{ adminName }}
        </span>
      </div>
    </header>

    <!-- PAGE CONTENT -->
    <main class="page-content">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
